# Aligned comparison run -- DisPose + graft_pose_v2, sample_stride 1 + fps 24
# so output is frame-for-frame aligned with the 24fps source clips (192 frames).
base_model_path: ./pretrained_weights/stable-video-diffusion-img2vid-xt-1-1
