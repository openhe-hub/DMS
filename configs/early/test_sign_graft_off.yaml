# Graft smoke test -- graft_pose_v2 DISABLED (stock DisPose preprocessing).

# Ref image = test2.jpg, the same cross-identity ref the jubail2 batch runs used.
base_model_path: ./pretrained_weights/stable-video-diffusion-img2vid-xt-1-1
