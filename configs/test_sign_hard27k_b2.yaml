# Hard-case comparison batch 2 -- 10 more contested-review asl27k words, original
# human signer videos (640x360 @~29.97fps). DisPose + graft_pose_v2,
# sample_stride 1 + fps 30 => frame-for-frame aligned output.
base_model_path: ./pretrained_weights/stable-video-diffusion-img2vid-xt-1-1
dift_model_path: ./pretrained_weights/stable-diffusion-v1-5

ckpt_path: ./pretrained_weights/MimicMotion_1-1.pth
controlnet_path: ./pretrained_weights/DisPose.pth

test_case:
  - ref_video_path: ./assets/example_data/sign_videos/hard27k_orig/0bcxsenqga.mp4
    ref_image_path: ./assets/example_data/sign_videos/refs/test2.jpg
    graft_pose: true
    num_frames: 16
    resolution: 576
    frames_overlap: 6
    num_inference_steps: 25
    noise_aug_strength: 0
    guidance_scale: 2.0
    sample_stride: 1
    decode_chunk_size: 8
    fps: 30
    seed: 42

