# Resolution ablation for hand sharpness: same clip/seed as the omnihand
# fusion arms (off = native DWPose), resolution 768 and 1024 vs the 576 run.
# Pixel budget hypothesis: hands are ~60-90px at 576 (~8-11 latent tokens),
# too small for finger detail; 768x768 matches SVD training pixel count.
base_model_path: ./pretrained_weights/stable-video-diffusion-img2vid-xt-1-1
dift_model_path: ./pretrained_weights/stable-diffusion-v1-5

ckpt_path: ./pretrained_weights/MimicMotion_1-1.pth
controlnet_path: ./pretrained_weights/DisPose.pth

test_case:
  - ref_video_path: ./assets/example_data/sign_videos/5ok8y3eheq8_7-1-rgb_front_8s.mp4
    ref_image_path: ./assets/example_data/sign_videos/refs/test2.jpg
    graft_pose: true
    hand_flow: true
    num_frames: 16
    resolution: 768
    frames_overlap: 6
    num_inference_steps: 25
    noise_aug_strength: 0
    guidance_scale: 2.0
    sample_stride: 1
    decode_chunk_size: 8
    fps: 24
    seed: 42

  - ref_video_path: ./assets/example_data/sign_videos/5ok8y3eheq8_7-1-rgb_front_8s.mp4
    ref_image_path: ./assets/example_data/sign_videos/refs/test2.jpg
    graft_pose: true
    hand_flow: true
    num_frames: 16
    resolution: 1024
    frames_overlap: 6
    num_inference_steps: 25
    noise_aug_strength: 0
    guidance_scale: 2.0
    sample_stride: 1
    decode_chunk_size: 8
    fps: 24
    seed: 42
